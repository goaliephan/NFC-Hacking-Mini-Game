<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #terminal {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    #text {
      white-space: pre-line;
      font-size: 1.1em;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: black;
      color: #00ff00;
      border: 1px solid #00ff00;
      cursor: pointer;
    }

    #progressBar {
      width: 100%;
      height: 20px;
      border: 1px solid #00ff00;
      margin-top: 15px;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: #00ff00;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <div id="text">> Tap INITIATE to begin...</div>
  <button onclick="startHack()">INITIATE HACK</button>

  <div id="progressBar">
    <div id="progress"></div>
  </div>
</div>

<script>
  // MATRIX EFFECT
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = [];

  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }

  function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(drawMatrix, 33);

  // HACKING SIMULATION
  const terminal = document.getElementById("text");
  const progress = document.getElementById("progress");

  function typeText(text, delay = 30) {
    return new Promise(resolve => {
      let i = 0;
      const interval = setInterval(() => {
        terminal.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          terminal.innerHTML += "\n";
          resolve();
        }
      }, delay);
    });
  }

  async function startHack() {
    terminal.innerHTML = "> Connecting...\n";
    progress.style.width = "0%";

    let percent = 0;

    const progressInterval = setInterval(() => {
      percent += Math.random() * 5;
      progress.style.width = percent + "%";
      if (percent >= 100) clearInterval(progressInterval);
    }, 200);

    await typeText("> Bypassing firewall...");
    await typeText("> Injecting payload...");
    await typeText("> Accessing secure database...");
    await typeText("> Decrypting files...");

    setTimeout(() => {
      const success = Math.random() > 0.3;

      if (success) {
        terminal.innerHTML += "\n> ACCESS GRANTED ✅";
      } else {
        terminal.innerHTML += "\n> ACCESS DENIED ❌";
      }
    }, 1000);
  }
</script>

</body>
</html>
